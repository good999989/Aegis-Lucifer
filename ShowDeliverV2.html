<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>WebSocket Data Viewer</title>

		<style>
			body {
				background: 
				color: #4A4A4A;
				margin: 0;
				padding: 0;
				height: 100vh;
				overflow:hidden;
				/* 让背景填满整个页面 */
			}

			#data-container {
			    white-space: pre;
				font-size: 17.5px;
				margin-top: 0px;
				
				word-wrap: break-all;
			width:100%;
			height:100%;
		position:absolute;
		top:0;
		left:50%;
		padding:0;
		transform:translateX(-50%);
		overflow-y:scroll;
		background:transparent;
			}
		</style>
	</head>
	<body>
		<div id="data-container">
			<p>未建立连接</p>
		</div>

		<script>
		    var temp = localStorage.getItem("ip")
		    if(temp==null){
		        temp = ""
		    }
			var ipaddr = prompt("输入IP", temp)
			if (ipaddr != null) {
				//ipaddr = '192.168.2.107'
		    	localStorage.setItem("ip",ipaddr)
			}

			const socket = new WebSocket('ws://' + ipaddr + ':8765');

			socket.onopen = () => {
				const container = document.getElementById('data-container');
				container.innerHTML = `<pre>连接已建立!!!!!</pre>`;
				console.log('WebSocket 连接已建立');
			};

			socket.onmessage = (event) => {
				const data = event.data; // 直接获取长字符串
				console.log('收到新数据:', data);
				const container = document.getElementById('data-container');
				if (data.length == 1) {
					if (data[0] == 'd') {
						container.scrollBy({
							top: window.innerHeight * 0.153, // 向下滚动
							behavior: "smooth" // 平滑滚动
						});
					} else if (data[0] == 'u') {
						container.scrollBy({
							top: -window.innerHeight * 0.153, // 向上滚动
							behavior: "smooth" // 平滑滚动
						});
					}

				} else {
					updateDataDisplay(data);
				}

			};

			socket.onerror = (error) => {
				console.error('WebSocket 错误:', error);
			};

			socket.onclose = () => {
				console.log('WebSocket 连接关闭');
			};
			function insertNewlines(text, maxLength = 72) {
				if (typeof text !== 'string') {
					throw new Error('输入必须是字符串');
				}
				console.log(maxLength)
				function charWidth(ch) {
					/** 估算字符宽度：中文≈2，英文≈1 */
					if (ch >= '\u4e00' && ch <= '\u9fff') {
						return 2;
					}
					return 1;
				}

				function strWidth(s) {
					return [...s].reduce((sum, ch) => sum + charWidth(ch), 0);
				}

				const result = [];
				const lines = text.split('\n');
				
				for (const line of lines) {
					// 取出缩进
					let indent = '';
					let content = line;
					
					for (let i = 0; i < line.length; i++) {
						const ch = line[i];
						if (ch === ' ' || ch === '\t') {
							indent += ch;
						} else {
							content = line.slice(indent.length);
							break;
						}
					}

					// 不需要换行的情况
					if (strWidth(content) <= maxLength) {
						result.push(line);
						continue;
					}

					let current = '';
					let currentLen = 0;
					const chunks = [];

					for (const ch of content) {
						const w = charWidth(ch);
						if (currentLen + w > maxLength) {
							chunks.push(current);
							current = ch;
							currentLen = w;
						} else {
							current += ch;
							currentLen += w;
						}
					}
					
					if (current) {
						chunks.push(current);
					}

					// 加回缩进
					chunks.forEach(chunk => {
						result.push(indent + chunk);
					});
				}

				return result.join('\n');
			}
			
			const dataContainer = document.querySelector('#data-container');
			const fontSize = parseFloat(window.getComputedStyle(dataContainer).fontSize);
			const englishCharWidth = fontSize * 0.5;
			const maxLength = Math.floor(window.innerWidth * 0.95 / englishCharWidth);

			function updateDataDisplay(data) {
				const container = document.getElementById('data-container');
				
				fmtData = insertNewlines(data, maxLength)
				container.innerText = `${fmtData}`;
			}
		</script>
	</body>
</html>
